name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: hooply
          POSTGRES_PASSWORD: hooply
          POSTGRES_DB: hooply_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U hooply"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # Matches apps/api/vitest.config.ts, which points integration tests at
      # a dedicated database so they never collide with real ingested data.
      DATABASE_URL: postgres://hooply:hooply@localhost:5432/hooply_test
      # Matches apps/api/vitest.config.ts's REDIS_URL (db index 1, same
      # reasoning as DATABASE_URL above).
      REDIS_URL: redis://localhost:6379/1
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm run typecheck

      - run: pnpm run lint

      - run: pnpm run db:migrate

      - run: pnpm run test
